@if (isOpen()) {
  <button
    type="button"
    class="fixed inset-0 z-40 h-full w-full cursor-default bg-transparent"
    (click)="closePanel.emit()"
    aria-label="Close environment settings"
  ></button>
  <section
    role="dialog"
    aria-label="Environment settings"
    id="environment-settings-panel"
    class="fixed right-4 top-20 z-50 w-[min(92vw,26rem)] rounded-2xl border border-white/10 bg-slate-950/95 shadow-2xl shadow-slate-950 sm:right-6 sm:top-22"
  >
    <header class="border-b border-white/10 px-4 py-3">
      <h2 class="text-base font-semibold text-slate-100">Environment settings</h2>
      <p class="mt-1 text-xs text-slate-300">Configure how Trove simulates your environment.</p>
    </header>

    <div class="space-y-3 px-4 py-3">
      <label class="block text-sm text-slate-200">
        <span class="mb-1.5 block text-xs font-medium uppercase tracking-[0.14em] text-slate-400">Browser</span>
        <select
          [ngModel]="draftBrowser()"
          (ngModelChange)="browserChange.emit($event)"
          class="min-h-11 w-full rounded-lg border border-white/15 bg-slate-900 px-3 text-sm text-slate-100 outline-none"
        >
          @for (browser of browserOptions(); track browser) {
            <option [value]="browser">{{ browserLabel(browser) }}</option>
          }
        </select>
      </label>

      <label class="block text-sm text-slate-200">
        <span class="mb-1.5 block text-xs font-medium uppercase tracking-[0.14em] text-slate-400">Language</span>
        <select
          [ngModel]="draftLanguage()"
          (ngModelChange)="languageChange.emit($event)"
          class="min-h-11 w-full rounded-lg border border-white/15 bg-slate-900 px-3 text-sm text-slate-100 outline-none"
        >
          @for (language of languageOptions(); track language) {
            <option [value]="language">{{ languageLabel(language) }}</option>
          }
        </select>
      </label>

      <label class="block text-sm text-slate-200">
        <span class="mb-1.5 block text-xs font-medium uppercase tracking-[0.14em] text-slate-400">OS</span>
        <select
          [ngModel]="draftOs()"
          (ngModelChange)="osChange.emit($event)"
          class="min-h-11 w-full rounded-lg border border-white/15 bg-slate-900 px-3 text-sm text-slate-100 outline-none"
        >
          @for (option of osOptions(); track option) {
            <option [value]="option">{{ osLabel(option) }}</option>
          }
        </select>
      </label>
    </div>

    <footer class="flex items-center justify-between border-t border-white/10 px-4 py-3">
      <div class="flex items-center gap-3">
        <button type="button" class="text-xs text-slate-300 hover:text-slate-100" (click)="resetDefaults.emit()">
          Reset to defaults
        </button>
        @if (installSupported()) {
          <button
            type="button"
            class="rounded-md border border-emerald-300/30 bg-emerald-400/10 px-2.5 py-1.5 text-xs font-medium text-emerald-100 hover:bg-emerald-400/20"
            (click)="installRequest.emit()"
          >
            Install app
          </button>
        }
      </div>
      <div class="flex gap-2">
        <button type="button" class="rounded-lg border border-white/15 px-3 py-1.5 text-xs text-slate-200" (click)="closePanel.emit()">
          Cancel
        </button>
        <button type="button" class="rounded-lg bg-white px-3 py-1.5 text-xs font-semibold text-slate-950" (click)="applyChanges.emit()">
          Apply
        </button>
      </div>
    </footer>
  </section>
}
